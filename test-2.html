<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gradient Gallery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0a0a0f;
      color: #f0f2ff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ===== Grid ===== */
    .gg-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(2, 1fr);
      gap: 16px;
      padding: 24px;
      width: 100%;
      max-width: 880px;
    }

    .gg-swatch {
      position: relative;
      aspect-ratio: 1 / 1;
      border-radius: 20px;
      cursor: pointer;
      overflow: hidden;
      transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1),
                  box-shadow 0.35s cubic-bezier(0.16, 1, 0.3, 1);
      will-change: transform;
    }

    .gg-swatch::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      border: 1px solid rgba(255,255,255,0.08);
      pointer-events: none;
      z-index: 1;
    }

    .gg-swatch::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 50%);
      pointer-events: none;
      z-index: 1;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .gg-swatch:hover {
      transform: scale(1.05);
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }

    .gg-swatch:hover::after {
      opacity: 1;
    }

    .gg-swatch.gg-hidden {
      opacity: 0;
      pointer-events: none;
    }

    /* ===== Lightbox Overlay ===== */
    .gg-overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      opacity: 0;
    }

    .gg-overlay.gg-active {
      pointer-events: auto;
      opacity: 1;
    }

    .gg-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0);
      transition: background 0.5s cubic-bezier(0.16, 1, 0.3, 1);
      z-index: 0;
    }

    .gg-overlay.gg-active .gg-backdrop {
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }

    /* ===== Lightbox Card ===== */
    .gg-card {
      position: relative;
      z-index: 1;
      width: 420px;
      border-radius: 28px;
      background: #13131a;
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 40px 120px rgba(0,0,0,0.6);
      overflow: hidden;
      opacity: 0;
      transform: scale(0.92) translateY(20px);
      transition: opacity 0.5s cubic-bezier(0.16, 1, 0.3, 1) 0.05s,
                  transform 0.5s cubic-bezier(0.16, 1, 0.3, 1) 0.05s;
    }

    .gg-overlay.gg-active .gg-card {
      opacity: 1;
      transform: scale(1) translateY(0);
    }

    /* The animated swatch clone that flies to the card */
    .gg-flying-swatch {
      position: fixed;
      z-index: 200;
      border-radius: 20px;
      pointer-events: none;
      will-change: transform, top, left, width, height, border-radius;
    }

    .gg-flying-swatch.gg-fly-to-card {
      transition: top 0.55s cubic-bezier(0.16, 1, 0.3, 1),
                  left 0.55s cubic-bezier(0.16, 1, 0.3, 1),
                  width 0.55s cubic-bezier(0.16, 1, 0.3, 1),
                  height 0.55s cubic-bezier(0.16, 1, 0.3, 1),
                  border-radius 0.55s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .gg-flying-swatch.gg-fly-back {
      transition: top 0.45s cubic-bezier(0.16, 1, 0.3, 1),
                  left 0.45s cubic-bezier(0.16, 1, 0.3, 1),
                  width 0.45s cubic-bezier(0.16, 1, 0.3, 1),
                  height 0.45s cubic-bezier(0.16, 1, 0.3, 1),
                  border-radius 0.45s cubic-bezier(0.16, 1, 0.3, 1),
                  opacity 0.3s ease 0.15s;
    }

    /* Card preview area (where the swatch lands) */
    .gg-card-preview {
      width: 100%;
      height: 240px;
      position: relative;
      overflow: hidden;
    }

    .gg-card-preview-bg {
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.4s ease 0.35s;
    }

    .gg-overlay.gg-active .gg-card-preview-bg {
      opacity: 1;
    }

    .gg-card-preview-shine {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.12) 0%, transparent 60%);
      pointer-events: none;
    }

    /* Card details */
    .gg-card-details {
      padding: 28px 28px 32px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .gg-card-name {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .gg-card-colors-row {
      display: flex;
      gap: 12px;
    }

    .gg-card-color-chip {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border-radius: 10px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .gg-card-color-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      flex-shrink: 0;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .gg-card-color-hex {
      font-family: 'JetBrains Mono', 'SF Mono', monospace;
      font-size: 13px;
      font-weight: 500;
      color: rgba(240,242,255,0.7);
      text-transform: uppercase;
    }

    .gg-card-meta {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .gg-card-meta-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .gg-card-meta-label {
      font-size: 13px;
      color: rgba(240,242,255,0.35);
      font-weight: 500;
    }

    .gg-card-meta-value {
      font-size: 13px;
      color: rgba(240,242,255,0.7);
      font-weight: 500;
    }

    .gg-card-css {
      padding: 14px 16px;
      border-radius: 12px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      font-family: 'JetBrains Mono', 'SF Mono', monospace;
      font-size: 12px;
      color: rgba(240,242,255,0.5);
      line-height: 1.6;
      word-break: break-all;
      cursor: pointer;
      transition: background 0.2s ease, border-color 0.2s ease;
      position: relative;
    }

    .gg-card-css:hover {
      background: rgba(255,255,255,0.07);
      border-color: rgba(255,255,255,0.12);
    }

    .gg-card-css-copied {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: #4ade80;
      opacity: 0;
      transition: opacity 0.2s ease;
      pointer-events: none;
    }

    .gg-card-css.gg-copied .gg-card-css-copied {
      opacity: 1;
    }

    .gg-card-css.gg-copied .gg-card-css-text {
      opacity: 0;
    }

    .gg-card-css-text {
      transition: opacity 0.2s ease;
    }

    /* Close hint */
    .gg-close-hint {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(0,0,0,0.4);
      border: 1px solid rgba(255,255,255,0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.2s ease;
      backdrop-filter: blur(10px);
      z-index: 2;
    }

    .gg-close-hint:hover {
      background: rgba(0,0,0,0.6);
      transform: scale(1.1);
    }

    .gg-close-hint svg {
      color: rgba(255,255,255,0.7);
    }

    /* ===== Responsive ===== */
    @media (max-width: 640px) {
      .gg-grid {
        grid-template-columns: repeat(2, 1fr);
        grid-template-rows: repeat(4, 1fr);
        gap: 12px;
        max-width: 360px;
      }

      .gg-card {
        width: calc(100vw - 40px);
        max-width: 380px;
      }

      .gg-card-preview {
        height: 200px;
      }

      .gg-card-details {
        padding: 22px 22px 28px;
      }
    }
  </style>
</head>
<body>

  <div class="gg-grid" id="gg-grid"></div>

  <div class="gg-overlay" id="gg-overlay">
    <div class="gg-backdrop" id="gg-backdrop"></div>
    <div class="gg-card" id="gg-card">
      <div class="gg-card-preview" id="gg-card-preview">
        <div class="gg-card-preview-bg" id="gg-card-preview-bg"></div>
        <div class="gg-card-preview-shine"></div>
        <div class="gg-close-hint" id="gg-close-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 6 6 18"></path>
            <path d="m6 6 12 12"></path>
          </svg>
        </div>
      </div>
      <div class="gg-card-details" id="gg-card-details"></div>
    </div>
  </div>

  <script>
    const gradients = [
      {
        name: 'Solar Flare',
        from: '#f97316',
        to: '#eab308',
        angle: 135,
        type: 'Warm'
      },
      {
        name: 'Ocean Drift',
        from: '#06b6d4',
        to: '#3b82f6',
        angle: 135,
        type: 'Cool'
      },
      {
        name: 'Berry Crush',
        from: '#ec4899',
        to: '#8b5cf6',
        angle: 135,
        type: 'Vibrant'
      },
      {
        name: 'Mint Breeze',
        from: '#10b981',
        to: '#06b6d4',
        angle: 135,
        type: 'Cool'
      },
      {
        name: 'Sunset Haze',
        from: '#f43f5e',
        to: '#f97316',
        angle: 135,
        type: 'Warm'
      },
      {
        name: 'Lavender Dream',
        from: '#818cf8',
        to: '#c084fc',
        angle: 135,
        type: 'Soft'
      },
      {
        name: 'Coral Reef',
        from: '#fb923c',
        to: '#f472b6',
        angle: 135,
        type: 'Vibrant'
      },
      {
        name: 'Arctic Aurora',
        from: '#22d3ee',
        to: '#a78bfa',
        angle: 135,
        type: 'Cool'
      }
    ];

    const grid = document.getElementById('gg-grid');
    const overlay = document.getElementById('gg-overlay');
    const backdrop = document.getElementById('gg-backdrop');
    const card = document.getElementById('gg-card');
    const cardPreviewBg = document.getElementById('gg-card-preview-bg');
    const cardDetails = document.getElementById('gg-card-details');
    const closeBtn = document.getElementById('gg-close-btn');

    let activeSwatch = null;
    let flyingEl = null;
    let isAnimating = false;

    // Build grid
    gradients.forEach((g, i) => {
      const el = document.createElement('div');
      el.className = 'gg-swatch';
      el.style.background = `linear-gradient(${g.angle}deg, ${g.from}, ${g.to})`;
      el.dataset.index = i;
      el.addEventListener('click', () => openLightbox(i, el));
      grid.appendChild(el);
    });

    function getGradientCSS(g) {
      return `linear-gradient(${g.angle}deg, ${g.from}, ${g.to})`;
    }

    function openLightbox(index, swatchEl) {
      if (isAnimating) return;
      isAnimating = true;
      activeSwatch = swatchEl;
      const g = gradients[index];

      // Populate card details
      cardPreviewBg.style.background = getGradientCSS(g);
      const cssStr = `background: linear-gradient(${g.angle}deg, ${g.from}, ${g.to});`;
      cardDetails.innerHTML = `
        <div class="gg-card-name">${g.name}</div>
        <div class="gg-card-colors-row">
          <div class="gg-card-color-chip">
            <div class="gg-card-color-dot" style="background: ${g.from}"></div>
            <span class="gg-card-color-hex">${g.from}</span>
          </div>
          <div class="gg-card-color-chip">
            <div class="gg-card-color-dot" style="background: ${g.to}"></div>
            <span class="gg-card-color-hex">${g.to}</span>
          </div>
        </div>
        <div class="gg-card-meta">
          <div class="gg-card-meta-item">
            <span class="gg-card-meta-label">Type</span>
            <span class="gg-card-meta-value">${g.type}</span>
          </div>
          <div class="gg-card-meta-item">
            <span class="gg-card-meta-label">Angle</span>
            <span class="gg-card-meta-value">${g.angle}°</span>
          </div>
          <div class="gg-card-meta-item">
            <span class="gg-card-meta-label">Stops</span>
            <span class="gg-card-meta-value">2 colors</span>
          </div>
        </div>
        <div class="gg-card-css" id="gg-css-block">
          <span class="gg-card-css-text">${cssStr}</span>
          <span class="gg-card-css-copied">Copied!</span>
        </div>
      `;

      // Copy CSS on click
      const cssBlock = document.getElementById('gg-css-block');
      cssBlock.addEventListener('click', () => {
        navigator.clipboard.writeText(cssStr).then(() => {
          cssBlock.classList.add('gg-copied');
          setTimeout(() => cssBlock.classList.remove('gg-copied'), 1500);
        });
      });

      // Get positions
      const swatchRect = swatchEl.getBoundingClientRect();

      // Create flying clone
      flyingEl = document.createElement('div');
      flyingEl.className = 'gg-flying-swatch';
      flyingEl.style.background = getGradientCSS(g);
      flyingEl.style.top = swatchRect.top + 'px';
      flyingEl.style.left = swatchRect.left + 'px';
      flyingEl.style.width = swatchRect.width + 'px';
      flyingEl.style.height = swatchRect.height + 'px';
      document.body.appendChild(flyingEl);

      // Hide original swatch
      swatchEl.classList.add('gg-hidden');

      // Show overlay (but card is still invisible/scaled down)
      overlay.classList.add('gg-active');

      // Compute target position (top of card preview area)
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          const cardRect = card.getBoundingClientRect();
          const targetTop = cardRect.top;
          const targetLeft = cardRect.left;
          const targetWidth = cardRect.width;
          const targetHeight = 240;

          flyingEl.classList.add('gg-fly-to-card');
          flyingEl.style.top = targetTop + 'px';
          flyingEl.style.left = targetLeft + 'px';
          flyingEl.style.width = targetWidth + 'px';
          flyingEl.style.height = targetHeight + 'px';
          flyingEl.style.borderRadius = '28px 28px 0 0';

          setTimeout(() => {
            isAnimating = false;
          }, 600);
        });
      });
    }

    function closeLightbox() {
      if (isAnimating || !activeSwatch) return;
      isAnimating = true;

      overlay.classList.remove('gg-active');

      if (flyingEl && activeSwatch) {
        const swatchRect = activeSwatch.getBoundingClientRect();

        // We need to get the grid position since the swatch is hidden
        // Use the stored swatch's expected position
        const allSwatches = grid.querySelectorAll('.gg-swatch');
        const idx = Array.from(allSwatches).indexOf(activeSwatch);
        
        // Temporarily show swatch to get rect, then hide again
        activeSwatch.classList.remove('gg-hidden');
        const targetRect = activeSwatch.getBoundingClientRect();
        activeSwatch.classList.add('gg-hidden');

        flyingEl.classList.remove('gg-fly-to-card');

        requestAnimationFrame(() => {
          flyingEl.classList.add('gg-fly-back');
          flyingEl.style.top = targetRect.top + 'px';
          flyingEl.style.left = targetRect.left + 'px';
          flyingEl.style.width = targetRect.width + 'px';
          flyingEl.style.height = targetRect.height + 'px';
          flyingEl.style.borderRadius = '20px';
        });

        setTimeout(() => {
          activeSwatch.classList.remove('gg-hidden');
          if (flyingEl && flyingEl.parentNode) {
            flyingEl.parentNode.removeChild(flyingEl);
          }
          flyingEl = null;
          activeSwatch = null;
          isAnimating = false;
        }, 500);
      } else {
        isAnimating = false;
      }
    }

    closeBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      closeLightbox();
    });

    backdrop.addEventListener('click', closeLightbox);

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeLightbox();
    });
  </script>
</body>
</html>
